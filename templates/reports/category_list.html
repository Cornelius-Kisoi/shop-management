{% extends 'base.html' %}

{% block title %}Expense Categories{% endblock %}

{% block content %}
<div class="row mb-3">
    <div class="col-md-6">
        <h2><i class="fas fa-tags"></i> Expense Categories</h2>
    </div>
    <div class="col-md-6 text-end">
        <a href="{% url 'reports:category_create' %}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Add Category
        </a>
        <a href="{% url 'reports:expense_list' %}" class="btn btn-secondary">Back</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                {% for cat in categories %}
                <tr>
                    <td>{{ cat.name }}</td>
                    <td>{{ cat.description|default:"-" }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="2" class="text-center">No categories</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
