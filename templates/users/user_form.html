{% extends 'base.html' %}

{% block title %}{% if user_obj %}Edit User{% else %}Add User{% endif %} - EXTREME TECH{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="fas fa-user"></i> {% if user_obj %}Edit User{% else %}Add User{% endif %}</h2>

<div class="card" style="max-width: 500px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" value="{{ user_obj.username|default:'' }}" {% if user_obj %}readonly{% endif %} required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ user_obj.email|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password {% if user_obj %}(leave blank to keep current){% endif %}</label>
                <input type="password" name="password" class="form-control" {% if not user_obj %}required{% endif %}>
            </div>
            <div class="mb-3">
                <label class="form-label">Role</label>
                <select name="role" class="form-select">
                    <option value="staff" {% if user_obj.role == 'staff' %}selected{% endif %}>Staff</option>
                    <option value="admin" {% if user_obj.role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save
                </button>
                <a href="{% url 'users:user_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
