app = "shop-management"

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_SETTINGS_MODULE = "shopmanagement.settings"

[deploy]
  release_command = "python manage.py migrate"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    method = "get"
    path = "/health/"  # Recommended: create a simple view that returns 200 OK
    restart_limit = 3